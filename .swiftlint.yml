swift_version: "6.2"
strict: true

opt_in_rules:
  - empty_count
  - empty_string
  - force_unwrapping
  - implicit_return
  - modifier_order
  - prefer_self_type_over_type_of_self
  - redundant_type_annotation
  - sorted_imports
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

disabled_rules:
  - trailing_whitespace

excluded:
  - DerivedData
  - build
  - .build

line_length:
  warning: 120
  error: 200

file_length:
  warning: 500
  error: 1200

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 100
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

reporter: "xcode"
