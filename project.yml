name: TokenMint
options:
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Release
targets:
  TokenMint:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Core
      - path: Features
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: TokenMint
        PRODUCT_BUNDLE_IDENTIFIER: com.chuangcius.tokenMint
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Camera is needed to scan QR codes for adding tokens"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Face ID is used to protect your vault"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: TokenMint
      debug:
        SWIFT_OPTIMIZATION_LEVEL: -Onone
      release:
        SWIFT_OPTIMIZATION_LEVEL: -O

  TokenMintTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/UnitTests
      - path: Tests/IntegrationTests
    dependencies:
      - target: TokenMint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chuangcius.tokenMint.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.2"
        SWIFT_STRICT_CONCURRENCY: complete

  TokenMintUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UITests
    dependencies:
      - target: TokenMint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chuangcius.tokenMint.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.2"
